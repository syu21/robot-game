{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h1>お問い合わせ</h1>
  <p>不具合報告・ご意見は以下までご連絡ください。</p>
  <p><a href="mailto:{{ support_email }}">{{ support_email }}</a></p>
  {% if sent %}
    <div class="notice">お問い合わせを受け付けました（運用連絡のみ）。</div>
  {% endif %}
  <form method="post" class="post-form">
    <input type="text" name="subject" maxlength="120" placeholder="件名（任意）" />
    <textarea name="body" rows="6" maxlength="2000" placeholder="内容（任意）"></textarea>
    <button type="submit">送信（受領のみ）</button>
  </form>
</div>
{% endblock %}
