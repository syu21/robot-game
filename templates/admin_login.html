{% extends 'base.html' %}
{% block content %}
<div class="auth">
  <h1>管理者ログイン</h1>
  <form method="post" class="card auth-card">
    <input type="hidden" name="next" value="{{ next_path or '' }}" />
    <label>ユーザー名</label>
    <input type="text" name="username" required />
    <label>パスワード</label>
    <input type="password" name="password" required />
    <button type="submit">管理者ログイン</button>
  </form>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <p class="link"><a href="{{ url_for('login') }}">通常ログインへ戻る</a></p>
</div>
{% endblock %}
