{% extends 'base.html' %}
{% block content %}
<div class="auth">
  <h1 class="auth-title">ログイン</h1>
  <p class="auth-lead">登録したアカウントで基地に戻りましょう。</p>
  <p class="upgrade-cost">パーツを集めて自分だけのロボを組み立て、ボスを倒して次の層へ進む探索ゲームです。</p>
  {% if message %}
  <div class="notice">{{ message }}</div>
  {% endif %}
  <form method="post" class="card auth-card">
    <input type="hidden" name="next" value="{{ next_path or '' }}" />
    <label for="login-username">ユーザー名</label>
    <input id="login-username" type="text" name="username" autocomplete="username" required />
    <label for="login-password">パスワード</label>
    <input id="login-password" type="password" name="password" autocomplete="current-password" required />
    <button type="submit">ログイン</button>
  </form>
  <p class="link"><a href="{{ url_for('register') }}">新規登録へ</a></p>
</div>
{% endblock %}
